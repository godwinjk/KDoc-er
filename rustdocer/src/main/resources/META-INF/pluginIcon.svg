<svg width="40" height="40" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- /// three slashes, full height -->
  <g stroke="#CE422B" stroke-width="2.8" stroke-linecap="round">
    <path d="M12 2 L2 42"/>
    <path d="M16 2 L6 42"/>
    <path d="M20 2 L10 42"/>
  </g>

  <!-- three horizontal lines at 1/4, 1/2, 3/4 height -->
  <path d="M23 12 L40 12" stroke="#3C3C3C" stroke-opacity="0.92" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M23 22 L34 22" stroke="#3C3C3C" stroke-opacity="0.6" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M23 32 L28 32" stroke="#3C3C3C" stroke-opacity="0.32" stroke-width="1.8" stroke-linecap="round"/>

  <!-- plus mark on the bottom line level, right edge aligned with top line -->
  <g stroke="#DEA584" stroke-width="2" stroke-linecap="round">
    <path d="M36 28 L36 36"/>
    <path d="M32 32 L40 32"/>
  </g>
</svg>
