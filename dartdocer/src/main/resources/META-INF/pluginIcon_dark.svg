<svg width="40" height="40" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- /// three slashes, full height -->
  <g stroke="#29B6F6" stroke-width="2.8" stroke-linecap="round">
    <path d="M12 2 L2 42"/>
    <path d="M16 2 L6 42"/>
    <path d="M20 2 L10 42"/>
  </g>

  <!-- three horizontal lines at 1/4, 1/2, 3/4 height -->
  <path d="M23 12 L40 12" stroke="#E8E8E8" stroke-opacity="0.95" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M23 22 L34 22" stroke="#E8E8E8" stroke-opacity="0.62" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M23 32 L28 32" stroke="#E8E8E8" stroke-opacity="0.34" stroke-width="1.8" stroke-linecap="round"/>

  <!-- plus mark on the bottom line level, right edge aligned with top line -->
